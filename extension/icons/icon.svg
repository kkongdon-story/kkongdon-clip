<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background: deep navy -->
  <rect width="128" height="128" rx="24" fill="#0F172A"/>

  <!-- Corner capture brackets (teal) -->
  <polyline points="16,40 16,16 40,16"    fill="none" stroke="#22D3EE" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="88,16 112,16 112,40"  fill="none" stroke="#22D3EE" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="16,88 16,112 40,112"  fill="none" stroke="#22D3EE" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="112,88 112,112 88,112" fill="none" stroke="#22D3EE" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- K letter: vertical bar + two diagonal arms -->
  <g stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="38" y1="30" x2="38" y2="98"/>
    <line x1="38" y1="62" x2="88" y2="30"/>
    <line x1="38" y1="62" x2="88" y2="98"/>
  </g>
</svg>
